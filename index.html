<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jiaqi Jiang</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=Noto+Serif:wght@400;500;600;700&family=Pinyon+Script&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Noto Serif', 'Noto Serif SC', "SimSun", "宋体", serif;
            color: #ffffff;
            position: relative;

            /* 背景照片 */
            background-image: url('bg.jpg');
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        /* 半透明渐变遮罩:中间最暗、边缘稍亮,突出中央文字 */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at center, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0.35) 60%, rgba(0,0,0,0.25) 100%);
            pointer-events: none;
            z-index: 0;
        }

        /* === 场景框架:三层叠在同一个视口内,通过 opacity 切换 === */
        .scene {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.8s ease;
            pointer-events: none;
            z-index: 1;
        }
        .scene.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* === Home 场景(保持原样) === */
        .line-top, .line-bottom {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 1px;
            background: rgba(255, 255, 255, 0.85);
            opacity: 0;
            animation: lineGrow 1.2s ease-out 0.2s forwards;
        }

        .line-top { top: 15%; }
        .line-bottom { bottom: 15%; animation-delay: 0.4s; }

        @keyframes lineGrow {
            from { width: 0; opacity: 0; }
            to { width: 60px; opacity: 0.85; }
        }

        .container {
            text-align: center;
            padding: 2rem;
            max-width: 95%;
        }

        .name {
            font-family: 'Noto Serif', 'Noto Serif SC', "SimSun", "宋体", serif;
            font-weight: 700;
            font-size: clamp(2rem, 5.5vw, 4.5rem);
            letter-spacing: 0.01em;
            line-height: 1.2;
            color: #ffffff;
            text-shadow: 0 2px 20px rgba(0, 0, 0, 0.6), 0 1px 3px rgba(0, 0, 0, 0.4);
            opacity: 0;
            animation: fadeUp 1s ease-out 0.6s forwards;
            white-space: nowrap;
        }

        .meta {
            margin-top: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1.2rem;
            font-family: 'Noto Serif', 'Noto Serif SC', "SimSun", "宋体", serif;
            font-size: 0.95rem;
            font-weight: 400;
            letter-spacing: 0.08em;
            color: rgba(255, 255, 255, 0.92);
            text-shadow: 0 1px 8px rgba(0, 0, 0, 0.5);
            opacity: 0;
            animation: fadeUp 1s ease-out 0.9s forwards;
        }

        .meta a {
            color: rgba(255, 255, 255, 0.92);
            text-decoration: none;
            position: relative;
            padding-bottom: 2px;
            transition: color 0.3s ease;
        }

        .meta a::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: 0;
            width: 100%;
            height: 1px;
            background: currentColor;
            transform: scaleX(0);
            transform-origin: right;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .meta a:hover::after {
            transform: scaleX(1);
            transform-origin: left;
        }

        .meta a:hover {
            color: #ffffff;
        }

        .divider {
            color: rgba(255, 255, 255, 0.5);
            font-weight: 300;
            user-select: none;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* === Research / Photography 场景 === */
        .scene-title {
            font-size: clamp(4rem, 13vw, 10rem);
            color: #ffffff;
            text-shadow: 0 2px 24px rgba(0, 0, 0, 0.6), 0 1px 4px rgba(0, 0, 0, 0.4);
            line-height: 1;
        }

        .scene-research .scene-title {
            font-family: 'Playfair Display', 'Noto Serif', serif;
            font-weight: 500;
            letter-spacing: 0.02em;
        }

        .scene-photography .scene-title {
            font-family: 'Pinyon Script', 'Playfair Display', cursive;
            font-weight: 400;
            letter-spacing: 0.01em;
            /* 花体字形较纤细,放大一档视觉分量才够 */
            font-size: clamp(5rem, 17vw, 13rem);
            line-height: 1.1;
            padding-bottom: 0.15em; /* 预留下拉笔画的空间 */
        }

        .scene-hint {
            position: absolute;
            bottom: 12%;
            left: 0;
            right: 0;
            text-align: center;
            font-family: 'Noto Serif', 'Noto Serif SC', serif;
            font-size: 0.85rem;
            font-weight: 400;
            letter-spacing: 0.18em;
            color: rgba(255, 255, 255, 0.75);
            text-shadow: 0 1px 8px rgba(0, 0, 0, 0.5);
            animation: hintPulse 2.6s ease-in-out infinite;
        }

        /* Home 场景的上下方向提示:同一套字体,更小、更靠边 */
        .home-hint {
            position: absolute;
            left: 0;
            right: 0;
            text-align: center;
            font-family: 'Noto Serif', 'Noto Serif SC', serif;
            font-size: 0.7rem;
            font-weight: 400;
            letter-spacing: 0.2em;
            color: rgba(255, 255, 255, 0.6);
            text-shadow: 0 1px 8px rgba(0, 0, 0, 0.5);
            animation: hintPulse 2.6s ease-in-out infinite;
            cursor: pointer;
            padding: 0.8rem 1rem;
            background: transparent;
            border: none;
            font-family: inherit;
            transition: color 0.3s ease;
            -webkit-tap-highlight-color: transparent;
        }
        .home-hint:hover { color: rgba(255, 255, 255, 0.95); }
        .home-hint-top    { top: 6%; }
        .home-hint-bottom { bottom: 6%; }

        .hint-mobile { display: none; }
        @media (hover: none) and (pointer: coarse) {
            .hint-desktop { display: none; }
            .hint-mobile  { display: inline; }
        }

        @keyframes hintPulse {
            0%, 100% { opacity: 0.55; }
            50%      { opacity: 0.95; }
        }

        /* 响应式 */
        @media (max-width: 700px) {
            .name {
                font-size: clamp(1.3rem, 6vw, 2.5rem);
                white-space: normal;
            }
            .meta {
                font-size: 0.85rem;
                gap: 0.9rem;
            }
            .line-top { top: 10%; }
            .line-bottom { bottom: 10%; }
            body {
                background-attachment: scroll;
            }
            .scene-title {
                font-size: clamp(3rem, 15vw, 6rem);
            }
            .scene-hint {
                font-size: 0.72rem;
                letter-spacing: 0.15em;
                bottom: 10%;
                padding: 0 1rem;
            }
        }
    </style>
</head>
<body>
    <!-- Home(默认场景) -->
    <section class="scene scene-home active" data-scene="0">
        <button type="button" class="home-hint home-hint-top" data-goto="-1">
            <span class="hint-desktop">Scroll Up for Research Page</span>
            <span class="hint-mobile">Tap for Research Page</span>
        </button>
        <div class="line-top"></div>
        <div class="container">
            <h1 class="name">Jiaqi Jiang&nbsp;(Jackee Martinez)</h1>
            <div class="meta">
                <a href="https://www.unsw.edu.au/engineering/our-schools/computer-science-and-engineering" target="_blank" rel="noopener noreferrer">School Of Computer Science and Engineering  University Of New South Wales Sydney  Australia</a>
            </div>
        </div>
        <div class="line-bottom"></div>
        <button type="button" class="home-hint home-hint-bottom" data-goto="1">
            <span class="hint-desktop">Scroll Down for Photography Page</span>
            <span class="hint-mobile">Tap for Photography Page</span>
        </button>
    </section>

    <!-- Research(滚轮上滑) -->
    <section class="scene scene-research" data-scene="-1">
        <h2 class="scene-title">Research</h2>
        <p class="scene-hint">Click any key to enter my research page</p>
    </section>

    <!-- Photography(滚轮下滑) -->
    <section class="scene scene-photography" data-scene="1">
        <h2 class="scene-title">Photography</h2>
        <p class="scene-hint">Click any key to enter my portfolio page</p>
    </section>

    <script>
        (function () {
            const scenes = {
                '-1': document.querySelector('.scene-research'),
                '0':  document.querySelector('.scene-home'),
                '1':  document.querySelector('.scene-photography'),
            };
            const TARGET = {
                '-1': './research/',
                '1':  './photography/',
            };
            let current = 0;
            let locked = false;
            const LOCK_MS = 850;

            function go(to) {
                if (to === current || locked) return;
                if (to < -1 || to > 1) return;
                locked = true;
                scenes[current].classList.remove('active');
                scenes[to].classList.add('active');
                current = to;
                setTimeout(() => { locked = false; }, LOCK_MS);
            }

            // 滚轮:上滑 → Research(-1);下滑 → Photography(1)
            window.addEventListener('wheel', (e) => {
                if (locked) return;
                if (e.deltaY < 0) go(current - 1);
                else if (e.deltaY > 0) go(current + 1);
            }, { passive: true });

            // 任意键 / 鼠标点击:仅在 Research / Photography 场景生效
            const enter = () => {
                const url = TARGET[current];
                if (url) window.location.href = url;
            };
            window.addEventListener('keydown', enter);
            window.addEventListener('click', enter);

            // Home 场景上下两个提示按钮:点击直接切到对应场景并跳转
            document.querySelectorAll('.home-hint').forEach((btn) => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const to = parseInt(btn.dataset.goto, 10);
                    const url = TARGET[to];
                    if (url) window.location.href = url;
                });
            });

            // 触屏:竖向滑动同义于滚轮
            let touchStartY = null;
            window.addEventListener('touchstart', (e) => {
                touchStartY = e.touches[0].clientY;
            }, { passive: true });
            window.addEventListener('touchend', (e) => {
                if (touchStartY === null) return;
                const dy = touchStartY - e.changedTouches[0].clientY;
                touchStartY = null;
                if (Math.abs(dy) < 40) return;
                if (dy > 0) go(current + 1);  // 手指上滑 ≈ 滚轮下滑
                else        go(current - 1);
            }, { passive: true });
        })();
    </script>
</body>
</html>
