<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jiaqi Jiang</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=Noto+Serif:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Noto Serif', 'Noto Serif SC', "SimSun", "宋体", serif;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            
            /* 背景照片 */
            background-image: url('bg.jpg');
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        /* 半透明渐变遮罩:中间最暗、边缘稍亮,突出中央文字 */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(ellipse at center, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0.35) 60%, rgba(0,0,0,0.25) 100%);
            pointer-events: none;
            z-index: 0;
        }

        /* 装饰短线 */
        .line-top, .line-bottom {
            position: fixed;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 1px;
            background: rgba(255, 255, 255, 0.85);
            opacity: 0;
            animation: lineGrow 1.2s ease-out 0.2s forwards;
            z-index: 2;
        }

        .line-top { top: 15%; }
        .line-bottom { bottom: 15%; animation-delay: 0.4s; }

        @keyframes lineGrow {
            from { width: 0; opacity: 0; }
            to { width: 60px; opacity: 0.85; }
        }

        .container {
            text-align: center;
            position: relative;
            z-index: 1;
            padding: 2rem;
            max-width: 95%;
        }

        .name {
            font-family: 'Noto Serif', 'Noto Serif SC', "SimSun", "宋体", serif;
            font-weight: 700;
            font-size: clamp(2rem, 5.5vw, 4.5rem);
            letter-spacing: 0.01em;
            line-height: 1.2;
            color: #ffffff;
            /* 文字阴影增强可读性 */
            text-shadow: 0 2px 20px rgba(0, 0, 0, 0.6), 0 1px 3px rgba(0, 0, 0, 0.4);
            opacity: 0;
            animation: fadeUp 1s ease-out 0.6s forwards;
            white-space: nowrap;
        }

        .meta {
            margin-top: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1.2rem;
            font-family: 'Noto Serif', 'Noto Serif SC', "SimSun", "宋体", serif;
            font-size: 0.95rem;
            font-weight: 400;
            letter-spacing: 0.08em;
            color: rgba(255, 255, 255, 0.92);
            text-shadow: 0 1px 8px rgba(0, 0, 0, 0.5);
            opacity: 0;
            animation: fadeUp 1s ease-out 0.9s forwards;
        }

        .meta a {
            color: rgba(255, 255, 255, 0.92);
            text-decoration: none;
            position: relative;
            padding-bottom: 2px;
            transition: color 0.3s ease;
        }

        .meta a::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: 0;
            width: 100%;
            height: 1px;
            background: currentColor;
            transform: scaleX(0);
            transform-origin: right;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .meta a:hover::after {
            transform: scaleX(1);
            transform-origin: left;
        }

        .meta a:hover {
            color: #ffffff;
        }

        .divider {
            color: rgba(255, 255, 255, 0.5);
            font-weight: 300;
            user-select: none;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 响应式 */
        @media (max-width: 700px) {
            .name {
                font-size: clamp(1.3rem, 6vw, 2.5rem);
                white-space: normal;
            }
            .meta {
                font-size: 0.85rem;
                gap: 0.9rem;
            }
            .line-top { top: 10%; }
            .line-bottom { bottom: 10%; }
            body {
                background-attachment: scroll; /* 移动端不用 fixed,性能更好 */
            }
        }
    </style>
</head>
<body>
    <div class="line-top"></div>
    
    <main class="container">
        <h1 class="name">Jiaqi Jiang&nbsp;(Jackee Martinez)</h1>
        
        <div class="meta">
            <a href="mailto:jjq1972556423@outlook.com">Contact Me</a>
            <span class="divider">·</span>
            <a href="https://www.unsw.edu.au" target="_blank" rel="noopener noreferrer">UNSW</a>
        </div>
    </main>

    <div class="line-bottom"></div>
</body>
</html>
